syntax = "proto3";

package dogsvr;

service CommonApiService {
  rpc CommonUnaryApi(CommonApiReq) returns (CommonApiRes) {};
}

message Head {
  uint32 cmd_id = 1;
  optional string open_id = 2;
  optional uint32 zone_id = 3;
  // uint64 on the wire, but ts-proto forceLong=number caps it at 2^53-1 (Number.MAX_SAFE_INTEGER)
  optional uint64 gid = 4;
}

message CommonApiReq {
  Head head = 1;
  string inner_req = 2;
}
message CommonApiRes {
  Head head = 1;
  string inner_res = 2;
}
